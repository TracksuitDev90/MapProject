<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Where I've Been — Interactive Visited Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      touch-action: none;
    }

    header {
      text-align: center;
      padding: 12px 20px 8px;
      width: 100%;
      z-index: 10;
      background: rgba(26, 26, 46, 0.95);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e0e0e0;
      letter-spacing: 0.5px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px 20px;
      flex-wrap: wrap;
      background: rgba(26, 26, 46, 0.95);
      z-index: 10;
      width: 100%;
      flex-shrink: 0;
    }

    .toolbar label {
      font-size: 0.85rem;
      color: #aaa;
    }

    .map-tabs {
      display: flex;
      gap: 4px;
    }

    .map-tabs button {
      padding: 6px 16px;
      border: 1px solid #444;
      background: transparent;
      color: #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .map-tabs button.active {
      background: #4a6fa5;
      color: #fff;
      border-color: #4a6fa5;
    }

    .map-tabs button:hover:not(.active) {
      background: #333;
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .color-picker-wrapper input[type="color"] {
      width: 32px;
      height: 32px;
      border: 2px solid #555;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 2px;
    }

    .preset-colors {
      display: flex;
      gap: 4px;
    }

    .preset-color {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }

    .preset-color:hover, .preset-color.active {
      border-color: #fff;
      transform: scale(1.15);
    }

    .btn {
      padding: 6px 14px;
      border: 1px solid #444;
      background: transparent;
      color: #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #333;
    }

    .btn-primary {
      background: #4a6fa5;
      color: #fff;
      border-color: #4a6fa5;
    }

    .btn-primary:hover {
      background: #3a5f95;
    }

    .btn-danger {
      border-color: #a54a4a;
      color: #e08080;
    }

    .btn-danger:hover {
      background: #3a1a1a;
    }

    .map-container {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    .map-container svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .map-container svg path[data-name] {
      cursor: pointer;
      transition: filter 0.15s;
    }

    .map-container svg path[data-name]:hover {
      stroke: #fff !important;
      stroke-width: 1.5 !important;
      filter: brightness(1.15);
    }

    .map-container svg text.state-label {
      pointer-events: none;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .zoom-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }

    .zoom-controls button {
      width: 36px;
      height: 36px;
      border: 1px solid #444;
      background: rgba(26, 26, 46, 0.9);
      color: #ccc;
      font-size: 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .zoom-controls button:hover {
      background: #333;
    }

    .tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 100;
      display: none;
      white-space: nowrap;
    }

    .stats {
      font-size: 0.85rem;
      color: #888;
    }

    .stats span {
      color: #4a6fa5;
      font-weight: 600;
    }

    .share-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .share-modal.open {
      display: flex;
    }

    .share-modal-content {
      background: #2a2a3e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
    }

    .share-modal-content h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
    }

    .share-modal-content textarea {
      width: 100%;
      height: 80px;
      background: #1a1a2e;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 4px;
      padding: 8px;
      font-size: 0.75rem;
      resize: none;
      font-family: monospace;
    }

    .share-modal-content .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: flex-end;
    }

    footer {
      text-align: center;
      padding: 6px;
      font-size: 0.7rem;
      color: #555;
      z-index: 10;
      background: rgba(26, 26, 46, 0.95);
      width: 100%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Where I've Been</h1>
  </header>

  <div class="toolbar">
    <div class="map-tabs">
      <button class="active" data-map="us">US States</button>
      <button data-map="world">World</button>
    </div>

    <div class="color-picker-wrapper">
      <label>Color:</label>
      <input type="color" id="colorPicker" value="#4a90d9">
      <div class="preset-colors">
        <div class="preset-color active" style="background:#4a90d9" data-color="#4a90d9"></div>
        <div class="preset-color" style="background:#e74c3c" data-color="#e74c3c"></div>
        <div class="preset-color" style="background:#2ecc71" data-color="#2ecc71"></div>
        <div class="preset-color" style="background:#f39c12" data-color="#f39c12"></div>
        <div class="preset-color" style="background:#9b59b6" data-color="#9b59b6"></div>
        <div class="preset-color" style="background:#1abc9c" data-color="#1abc9c"></div>
      </div>
    </div>

    <div class="stats" id="stats">
      <span id="visitedCount">0</span> / <span id="totalCount">0</span> visited
    </div>

    <button class="btn btn-primary" id="shareBtn">Share / Save</button>
    <button class="btn btn-danger" id="clearBtn">Clear All</button>
  </div>

  <div class="map-container" id="mapContainer"></div>

  <div class="zoom-controls">
    <button id="zoomIn" title="Zoom in">+</button>
    <button id="zoomOut" title="Zoom out">&minus;</button>
    <button id="zoomReset" title="Reset view">&#8634;</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="share-modal" id="shareModal">
    <div class="share-modal-content">
      <h2>Share Your Map</h2>
      <p style="font-size:0.85rem; color:#aaa; margin-bottom:12px;">
        Copy the link below to share your visited map. Anyone with this link will see your colored regions.
      </p>
      <textarea id="shareUrl" readonly></textarea>
      <div class="btn-row">
        <button class="btn" id="closeModal">Close</button>
        <button class="btn btn-primary" id="copyLink">Copy Link</button>
      </div>
    </div>
  </div>

  <footer>
    US map &copy; <a href="https://simplemaps.com" style="color:#666">Simplemaps.com</a> &mdash;
    World map from <a href="https://github.com/johan/world.geo.json" style="color:#666">Natural Earth</a>
  </footer>

  <script>
    // =============================================
    // State label positions (SVG coordinate space)
    // =============================================
    const US_LABEL_POSITIONS = {"MA":{"x":938.6,"y":137.3},"MN":{"x":610.6,"y":124.9},"MT":{"x":386.3,"y":103.9},"ND":{"x":517.3,"y":104.7},"HI":{"x":375,"y":520},"ID":{"x":314.3,"y":147.8},"WA":{"x":243.3,"y":71.0},"AZ":{"x":321.2,"y":361.7},"CA":{"x":210,"y":310},"CO":{"x":432.4,"y":273.5},"NV":{"x":259.8,"y":268.7},"NM":{"x":418.2,"y":368.0},"OR":{"x":224.9,"y":136.1},"UT":{"x":338.7,"y":260.3},"WY":{"x":407.9,"y":190.1},"AR":{"x":650.1,"y":357.2},"IA":{"x":620.9,"y":211.2},"KS":{"x":548.7,"y":286.6},"MO":{"x":652.5,"y":293.9},"NE":{"x":526.9,"y":228.9},"OK":{"x":555,"y":345.4},"SD":{"x":517.7,"y":169.9},"LA":{"x":668,"y":418},"TX":{"x":520.3,"y":434.3},"CT":{"x":938,"y":158},"NH":{"x":935,"y":108},"RI":{"x":950,"y":167},"VT":{"x":912,"y":96},"AL":{"x":750.7,"y":388.6},"FL":{"x":835,"y":478},"GA":{"x":805.2,"y":376.2},"MS":{"x":696.7,"y":394.7},"SC":{"x":839.4,"y":351.1},"IL":{"x":685.8,"y":255.0},"IN":{"x":735.3,"y":247.1},"KY":{"x":760,"y":290.0},"NC":{"x":852,"y":308},"OH":{"x":784.7,"y":224.2},"TN":{"x":750.8,"y":321.3},"VA":{"x":850,"y":272},"WI":{"x":664.2,"y":151.8},"WV":{"x":832,"y":250},"DE":{"x":905,"y":247},"DC":{"x":880,"y":243},"MD":{"x":900,"y":238},"NJ":{"x":915,"y":210},"NY":{"x":893,"y":145},"PA":{"x":867,"y":194.0},"ME":{"x":952.8,"y":75},"MI":{"x":730,"y":168},"AK":{"x":161.1,"y":497.8}};

    const FILL_OPACITY = 0.4;

    // Blend a hex color with white at given opacity, return solid hex color
    // This avoids dark backgrounds bleeding through transparent fills
    function tintColor(hex, opacity) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const tr = Math.round(r * opacity + 255 * (1 - opacity));
      const tg = Math.round(g * opacity + 255 * (1 - opacity));
      const tb = Math.round(b * opacity + 255 * (1 - opacity));
      return '#' + [tr, tg, tb].map(c => c.toString(16).padStart(2, '0')).join('');
    }

    const state = {
      currentMap: 'us',
      selectedColor: '#4a90d9',
      visited: { us: {}, world: {} },
      svgCache: {},
      // viewBox-based zoom/pan state
      vb: null,        // current viewBox {x, y, w, h}
      vbDefault: null,  // original viewBox for reset
    };

    const mapContainer = document.getElementById('mapContainer');
    const tooltip = document.getElementById('tooltip');
    const colorPicker = document.getElementById('colorPicker');
    const visitedCount = document.getElementById('visitedCount');
    const totalCount = document.getElementById('totalCount');

    // --- Color picker ---
    colorPicker.addEventListener('input', (e) => {
      state.selectedColor = e.target.value;
      document.querySelectorAll('.preset-color').forEach(el => el.classList.remove('active'));
    });

    document.querySelectorAll('.preset-color').forEach(el => {
      el.addEventListener('click', () => {
        state.selectedColor = el.dataset.color;
        colorPicker.value = el.dataset.color;
        document.querySelectorAll('.preset-color').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
      });
    });

    // --- Map tab switching ---
    document.querySelectorAll('.map-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.currentMap = btn.dataset.map;
        loadMap(btn.dataset.map);
      });
    });

    // =============================================
    // ViewBox-based zoom & pan
    // =============================================
    function applyViewBox() {
      const svg = mapContainer.querySelector('svg');
      if (!svg || !state.vb) return;
      svg.setAttribute('viewBox', `${state.vb.x} ${state.vb.y} ${state.vb.w} ${state.vb.h}`);
    }

    function resetView() {
      if (state.vbDefault) {
        state.vb = { ...state.vbDefault };
        applyViewBox();
      }
    }

    // Convert client (screen) coordinates to SVG viewBox coordinates
    function clientToSvg(clientX, clientY) {
      const svg = mapContainer.querySelector('svg');
      if (!svg || !state.vb) return { x: 0, y: 0 };
      const rect = svg.getBoundingClientRect();
      const fracX = (clientX - rect.left) / rect.width;
      const fracY = (clientY - rect.top) / rect.height;
      return {
        x: state.vb.x + fracX * state.vb.w,
        y: state.vb.y + fracY * state.vb.h,
      };
    }

    function zoomAtPoint(factor, cx, cy) {
      if (!state.vb) return;
      // cx, cy are in SVG viewBox coordinates — the point that should stay fixed
      const newW = state.vbDefault.w / factor;
      const newH = state.vbDefault.h / factor;
      // Clamp: don't zoom out past original, max ~20x zoom
      const minW = state.vbDefault.w / 20;
      const clampedW = Math.max(minW, Math.min(state.vbDefault.w, newW));
      const clampedH = Math.max(state.vbDefault.h / 20, Math.min(state.vbDefault.h, clampedW * state.vbDefault.h / state.vbDefault.w));

      // Keep the point (cx, cy) at the same fractional position in the viewport
      const fracX = (cx - state.vb.x) / state.vb.w;
      const fracY = (cy - state.vb.y) / state.vb.h;

      state.vb.w = clampedW;
      state.vb.h = clampedH;
      state.vb.x = cx - fracX * state.vb.w;
      state.vb.y = cy - fracY * state.vb.h;

      applyViewBox();
    }

    function zoomBy(factor) {
      if (!state.vb) return;
      // Zoom centered on the current viewport center
      const cx = state.vb.x + state.vb.w / 2;
      const cy = state.vb.y + state.vb.h / 2;
      const currentZoom = state.vbDefault.w / state.vb.w;
      const newZoom = currentZoom * factor;
      zoomAtPoint(newZoom, cx, cy);
    }

    document.getElementById('zoomIn').addEventListener('click', () => zoomBy(1.4));
    document.getElementById('zoomOut').addEventListener('click', () => zoomBy(1 / 1.4));
    document.getElementById('zoomReset').addEventListener('click', resetView);

    // --- Mouse wheel zoom ---
    mapContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (!state.vb) return;
      const svgPt = clientToSvg(e.clientX, e.clientY);
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      const currentZoom = state.vbDefault.w / state.vb.w;
      zoomAtPoint(currentZoom * factor, svgPt.x, svgPt.y);
    }, { passive: false });

    // --- Pan (mouse drag & touch drag) ---
    let panState = null;

    mapContainer.addEventListener('mousedown', onPanStart);
    mapContainer.addEventListener('touchstart', onPanStart, { passive: false });

    function onPanStart(e) {
      const point = e.touches ? e.touches[0] : e;
      const isTouch = !!e.touches;

      // For touch with 2+ fingers, let pinch handler deal with it
      if (e.touches && e.touches.length >= 2) return;

      panState = {
        startClientX: point.clientX,
        startClientY: point.clientY,
        startVbX: state.vb.x,
        startVbY: state.vb.y,
        moved: false,
        isTouch: isTouch,
      };

      if (!isTouch) e.preventDefault();
    }

    window.addEventListener('mousemove', onPanMove);
    window.addEventListener('touchmove', onPanMove, { passive: false });

    function onPanMove(e) {
      if (!panState) return;
      // If pinch started, abort pan
      if (e.touches && e.touches.length >= 2) { panState = null; return; }

      const point = e.touches ? e.touches[0] : e;
      const svg = mapContainer.querySelector('svg');
      if (!svg || !state.vb) return;
      const rect = svg.getBoundingClientRect();

      const dx = (point.clientX - panState.startClientX) / rect.width * state.vb.w;
      const dy = (point.clientY - panState.startClientY) / rect.height * state.vb.h;

      if (Math.abs(point.clientX - panState.startClientX) > 3 ||
          Math.abs(point.clientY - panState.startClientY) > 3) {
        panState.moved = true;
      }

      state.vb.x = panState.startVbX - dx;
      state.vb.y = panState.startVbY - dy;
      applyViewBox();
      e.preventDefault();
    }

    window.addEventListener('mouseup', onPanEnd);
    window.addEventListener('touchend', onPanEnd);
    window.addEventListener('touchcancel', onPanEnd);

    function onPanEnd() {
      panState = null;
    }

    // --- Pinch to zoom (mobile) ---
    let pinchState = null;

    mapContainer.addEventListener('touchstart', onPinchStart, { passive: false });

    function onPinchStart(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        panState = null; // cancel any pan
        const t0 = e.touches[0], t1 = e.touches[1];
        const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
        const midX = (t0.clientX + t1.clientX) / 2;
        const midY = (t0.clientY + t1.clientY) / 2;
        const svgMid = clientToSvg(midX, midY);
        pinchState = {
          startDist: dist,
          startZoom: state.vbDefault.w / state.vb.w,
          centerX: svgMid.x,
          centerY: svgMid.y,
        };
      }
    }

    window.addEventListener('touchmove', onPinchMove, { passive: false });

    function onPinchMove(e) {
      if (!pinchState || e.touches.length < 2) return;
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
      const scale = dist / pinchState.startDist;
      const newZoom = pinchState.startZoom * scale;
      zoomAtPoint(newZoom, pinchState.centerX, pinchState.centerY);
    }

    window.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) pinchState = null;
    });

    // --- Tooltip ---
    mapContainer.addEventListener('mousemove', (e) => {
      const path = e.target.closest('path[data-name]');
      if (path) {
        const name = path.getAttribute('data-name');
        if (name) {
          tooltip.style.display = 'block';
          tooltip.textContent = name;
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
        }
      } else {
        tooltip.style.display = 'none';
      }
    });

    mapContainer.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    // --- Click to color ---
    mapContainer.addEventListener('click', (e) => {
      // Don't color if user was panning
      if (panState && panState.moved) return;

      const path = e.target.closest('path[data-name]');
      if (!path) return;
      const id = path.id || path.getAttribute('data-id');
      if (!id) return;

      const mapData = state.visited[state.currentMap];

      if (mapData[id] === state.selectedColor) {
        delete mapData[id];
        path.style.fill = state.currentMap === 'us' ? '#f9f9f9' : '#c0c0c0';
        path.style.fillOpacity = '1';
      } else {
        mapData[id] = state.selectedColor;
        path.style.fill = tintColor(state.selectedColor, FILL_OPACITY);
        path.style.fillOpacity = '1';
      }

      updateStats();
      saveToLocalStorage();
    });

    // Prevent click from firing after a drag
    mapContainer.addEventListener('click', (e) => {
      if (panState && panState.moved) {
        e.stopPropagation();
      }
    }, true);

    // --- Stats ---
    function updateStats() {
      const paths = mapContainer.querySelectorAll('svg path[data-name]');
      const mapData = state.visited[state.currentMap];
      visitedCount.textContent = Object.keys(mapData).length;
      totalCount.textContent = paths.length;
    }

    // --- Add state labels to US map ---
    function addStateLabels(svg) {
      const ns = 'http://www.w3.org/2000/svg';
      for (const [abbr, pos] of Object.entries(US_LABEL_POSITIONS)) {
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', pos.x);
        text.setAttribute('y', pos.y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('class', 'state-label');
        text.setAttribute('font-size', '11');
        text.setAttribute('font-weight', '600');
        text.setAttribute('fill', '#333');
        text.setAttribute('stroke', '#fff');
        text.setAttribute('stroke-width', '2.5');
        text.setAttribute('paint-order', 'stroke');
        text.textContent = abbr;
        svg.appendChild(text);
      }
    }

    // --- Load SVG maps ---
    async function loadMap(mapType) {
      mapContainer.innerHTML = '<p style="color:#888">Loading map...</p>';

      try {
        let svgText;
        if (state.svgCache[mapType]) {
          svgText = state.svgCache[mapType];
        } else {
          const url = mapType === 'us' ? 'us.svg' : 'world.svg';
          const resp = await fetch(url);
          svgText = await resp.text();
          state.svgCache[mapType] = svgText;
        }

        const parser = new DOMParser();
        const doc = parser.parseFromString(svgText, 'image/svg+xml');
        const svg = doc.querySelector('svg');

        // Ensure viewBox is set
        if (!svg.getAttribute('viewBox')) {
          const w = parseFloat(svg.getAttribute('width')) || 1000;
          const h = parseFloat(svg.getAttribute('height')) || 500;
          svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        }

        // Parse the native viewBox — this is our zoom/pan basis
        const vbParts = svg.getAttribute('viewBox').split(/\s+/).map(Number);
        state.vbDefault = { x: vbParts[0], y: vbParts[1], w: vbParts[2], h: vbParts[3] };
        state.vb = { ...state.vbDefault };

        // Let the SVG fill its container via CSS, remove fixed dimensions
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

        // Set default fills
        svg.querySelectorAll('path').forEach(path => {
          const defaultFill = mapType === 'us' ? '#f9f9f9' : '#c0c0c0';
          path.style.fill = defaultFill;
          path.style.fillOpacity = '1';
          path.style.stroke = '#666';
          path.style.strokeWidth = mapType === 'us' ? '0.8' : '0.5';
        });

        // Add state labels for US map
        if (mapType === 'us') {
          addStateLabels(svg);
        }

        mapContainer.innerHTML = '';
        mapContainer.appendChild(svg);

        // Restore visited colors
        const mapData = state.visited[state.currentMap];
        for (const [id, color] of Object.entries(mapData)) {
          const paths = svg.querySelectorAll(`#${CSS.escape(id)}`);
          paths.forEach(p => {
            p.style.fill = tintColor(color, FILL_OPACITY);
            p.style.fillOpacity = '1';
          });
        }

        updateStats();
      } catch (err) {
        mapContainer.innerHTML = `<p style="color:#e08080">Failed to load map: ${err.message}</p>`;
        console.error(err);
      }
    }

    // --- Share / Save ---
    function encodeState() {
      const data = {};
      for (const [mapType, visited] of Object.entries(state.visited)) {
        if (Object.keys(visited).length > 0) {
          data[mapType] = visited;
        }
      }
      return btoa(JSON.stringify(data));
    }

    function decodeState(encoded) {
      try {
        return JSON.parse(atob(encoded));
      } catch {
        return null;
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem('visitedMaps', JSON.stringify(state.visited));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('visitedMaps');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed.us) state.visited.us = parsed.us;
          if (parsed.world) state.visited.world = parsed.world;
        } catch {}
      }
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const data = params.get('data');
      if (data) {
        const decoded = decodeState(data);
        if (decoded) {
          if (decoded.us) state.visited.us = decoded.us;
          if (decoded.world) state.visited.world = decoded.world;
          return true;
        }
      }
      return false;
    }

    document.getElementById('shareBtn').addEventListener('click', () => {
      const encoded = encodeState();
      const url = window.location.origin + window.location.pathname + '?data=' + encoded;
      document.getElementById('shareUrl').value = url;
      document.getElementById('shareModal').classList.add('open');
    });

    document.getElementById('copyLink').addEventListener('click', () => {
      const textarea = document.getElementById('shareUrl');
      textarea.select();
      navigator.clipboard.writeText(textarea.value).then(() => {
        document.getElementById('copyLink').textContent = 'Copied!';
        setTimeout(() => {
          document.getElementById('copyLink').textContent = 'Copy Link';
        }, 2000);
      });
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('shareModal').classList.remove('open');
    });

    document.getElementById('shareModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('open');
      }
    });

    // --- Clear ---
    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!confirm('Clear all visited regions on the current map?')) return;
      state.visited[state.currentMap] = {};
      saveToLocalStorage();
      loadMap(state.currentMap);
    });

    // --- Init ---
    const loadedFromUrl = loadFromUrl();
    if (!loadedFromUrl) {
      loadFromLocalStorage();
    }
    loadMap('us');
  </script>
</body>
</html>
