<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Where I've Been — Interactive Visited Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       Material Design 3 — Dark Theme
       Purple / Black palette
       ======================================== */

    :root {
      --md-primary: #D0BCFF;
      --md-on-primary: #381E72;
      --md-primary-container: #4F378B;
      --md-on-primary-container: #EADDFF;
      --md-secondary: #CCC2DC;
      --md-on-secondary: #332D41;
      --md-secondary-container: #4A4458;
      --md-on-secondary-container: #E8DEF8;
      --md-tertiary: #EFB8C8;
      --md-error: #F2B8B5;
      --md-on-error: #601410;

      --md-surface: #0E0B13;
      --md-surface-dim: #0E0B13;
      --md-surface-container-lowest: #090710;
      --md-surface-container-low: #1D1A25;
      --md-surface-container: #211F2B;
      --md-surface-container-high: #2C2935;
      --md-surface-container-highest: #373440;
      --md-on-surface: #E6E0E9;
      --md-on-surface-variant: #CAC4D0;
      --md-outline: #938F99;
      --md-outline-variant: #49454F;

      --md-shape-xs: 4px;
      --md-shape-sm: 8px;
      --md-shape-md: 12px;
      --md-shape-lg: 16px;
      --md-shape-xl: 28px;
      --md-shape-full: 9999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--md-surface);
      color: var(--md-on-surface);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Top bar: header + toolbar unified --- */
    .top-bar {
      z-index: 10;
      width: 100%;
      flex-shrink: 0;
      background: var(--md-surface-container);
      border-bottom: 1px solid var(--md-outline-variant);
    }

    header {
      text-align: center;
      padding: 14px 24px 6px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--md-on-surface);
      letter-spacing: -0.2px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 10px 24px 14px;
      flex-wrap: wrap;
    }

    /* Toolbar group dividers */
    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--md-outline-variant);
      flex-shrink: 0;
    }

    .toolbar label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--md-on-surface-variant);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* --- Segmented button (M3 map tabs) --- */
    .map-tabs {
      display: flex;
      border: 1px solid var(--md-outline);
      border-radius: var(--md-shape-full);
      overflow: hidden;
    }

    .map-tabs button {
      padding: 8px 20px;
      border: none;
      border-right: 1px solid var(--md-outline);
      background: transparent;
      color: var(--md-on-surface);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.1px;
      transition: background 0.2s, color 0.2s;
    }

    .map-tabs button:last-child { border-right: none; }

    .map-tabs button.active {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
    }

    .map-tabs button:hover:not(.active) {
      background: rgba(208, 188, 255, 0.08);
    }

    /* --- Color picker group --- */
    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-picker-wrapper input[type="color"] {
      width: 32px;
      height: 32px;
      border: 2px solid var(--md-outline-variant);
      border-radius: var(--md-shape-sm);
      cursor: pointer;
      background: none;
      padding: 0;
      transition: border-color 0.2s;
    }

    .color-picker-wrapper input[type="color"]:hover {
      border-color: var(--md-outline);
    }

    .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 3px;
    }

    /* --- Preset color chips --- */
    .preset-colors {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .preset-color {
      width: 26px;
      height: 26px;
      border-radius: var(--md-shape-full);
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .preset-color:hover {
      border-color: var(--md-on-surface-variant);
      transform: scale(1.15);
    }

    .preset-color.active {
      border-color: var(--md-primary);
      transform: scale(1.15);
      box-shadow: 0 0 0 2px var(--md-surface-container), 0 0 0 4px var(--md-primary);
    }

    /* --- M3 Buttons --- */
    .btn {
      padding: 0 24px;
      height: 36px;
      border: 1px solid var(--md-outline);
      background: transparent;
      color: var(--md-primary);
      border-radius: var(--md-shape-full);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.1px;
      transition: background 0.2s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn:hover { background: rgba(208, 188, 255, 0.08); }
    .btn:active { background: rgba(208, 188, 255, 0.12); }

    .btn-primary {
      background: var(--md-primary);
      color: var(--md-on-primary);
      border: none;
    }

    .btn-primary:hover {
      background: var(--md-primary);
      box-shadow: 0 1px 3px 1px rgba(0,0,0,0.3);
      filter: brightness(1.08);
    }

    .btn-primary:active {
      box-shadow: none;
      filter: brightness(0.92);
    }

    .btn-danger {
      border-color: var(--md-error);
      color: var(--md-error);
    }

    .btn-danger:hover { background: rgba(242, 184, 181, 0.08); }
    .btn-danger:active { background: rgba(242, 184, 181, 0.12); }

    /* --- Map container --- */
    .map-container {
      flex: 1;
      width: 100%;
      overflow: hidden;
      position: relative;
      background: radial-gradient(ellipse at 50% 40%, #16132a 0%, var(--md-surface-dim) 70%);
      cursor: grab;
      touch-action: none;
    }

    .map-container.grabbing { cursor: grabbing; }

    .map-container svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      transform-origin: 0 0;
      will-change: transform;
      transition: transform 0.18s ease-out;
    }

    .map-container.dragging svg {
      transition: none;
    }

    .map-container svg path[data-name] {
      cursor: pointer;
      transition: fill 0.2s ease, filter 0.2s ease, stroke 0.2s ease, stroke-width 0.2s ease;
    }

    .map-container svg path[data-name]:hover {
      stroke: rgba(230, 224, 233, 0.6) !important;
      stroke-width: 1.8 !important;
      filter: brightness(1.35) saturate(1.15);
    }

    .map-container svg text.state-label {
      pointer-events: none;
      user-select: none;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* --- Zoom controls: M3 small FABs --- */
    .zoom-controls {
      position: fixed;
      bottom: 48px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .zoom-controls button {
      width: 44px;
      height: 44px;
      border: none;
      background: var(--md-surface-container-high);
      color: var(--md-primary);
      font-size: 1.3rem;
      border-radius: var(--md-shape-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px 2px rgba(0,0,0,0.2), 0 1px 2px 0 rgba(0,0,0,0.3);
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .zoom-controls button:hover {
      background: var(--md-surface-container-highest);
      box-shadow: 0 4px 8px 3px rgba(0,0,0,0.2), 0 1px 3px 0 rgba(0,0,0,0.3);
      transform: scale(1.05);
    }

    .zoom-controls button:active {
      transform: scale(0.95);
      box-shadow: 0 1px 3px 1px rgba(0,0,0,0.25);
    }

    /* --- Tooltip --- */
    .tooltip {
      position: fixed;
      background: var(--md-on-surface);
      color: var(--md-surface);
      padding: 6px 14px;
      border-radius: var(--md-shape-sm);
      font-size: 0.75rem;
      font-weight: 500;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* --- Stats chip --- */
    .stats {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--md-on-surface-variant);
      background: var(--md-surface-container-high);
      padding: 6px 16px;
      border-radius: var(--md-shape-full);
      white-space: nowrap;
    }

    .stats span {
      color: var(--md-primary);
      font-weight: 600;
    }

    /* --- Share modal: M3 dialog --- */
    .share-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: background 0.2s ease;
    }

    .share-modal.open {
      background: rgba(0, 0, 0, 0.5);
      pointer-events: auto;
    }

    .share-modal-content {
      background: var(--md-surface-container-high);
      border-radius: var(--md-shape-xl);
      padding: 24px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 12px 6px rgba(0,0,0,0.25), 0 4px 4px 0 rgba(0,0,0,0.3);
      transform: scale(0.92) translateY(12px);
      opacity: 0;
      transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1), opacity 0.2s ease;
    }

    .share-modal.open .share-modal-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .share-modal-content h2 {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--md-on-surface);
      margin-bottom: 16px;
    }

    .share-modal-content textarea {
      width: 100%;
      height: 80px;
      background: var(--md-surface-container-lowest);
      border: 1px solid var(--md-outline-variant);
      color: var(--md-on-surface);
      border-radius: var(--md-shape-sm);
      padding: 12px;
      font-size: 0.75rem;
      resize: none;
      font-family: monospace;
      transition: border-color 0.2s;
    }

    .share-modal-content textarea:focus {
      outline: none;
      border-color: var(--md-primary);
      border-width: 2px;
      padding: 11px;
    }

    .share-modal-content .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    /* --- Footer --- */
    footer {
      text-align: center;
      padding: 6px 16px;
      font-size: 0.6875rem;
      color: var(--md-outline);
      z-index: 10;
      background: var(--md-surface-container);
      width: 100%;
      flex-shrink: 0;
    }

    footer a {
      color: var(--md-on-surface-variant);
      transition: color 0.2s;
    }

    footer a:hover { color: var(--md-primary); }

    /* --- Spinner for loading --- */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* --- Click pulse on region toggle --- */
    @keyframes region-pulse {
      0% { filter: brightness(1.6); }
      100% { filter: brightness(1); }
    }

    .map-container svg path.pulse {
      animation: region-pulse 0.35s ease-out;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <header>
      <h1>Where I've Been</h1>
    </header>

    <div class="toolbar">
      <div class="map-tabs">
        <button class="active" data-map="us">US States</button>
        <button data-map="world">World</button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="color-picker-wrapper">
        <label>Color</label>
        <input type="color" id="colorPicker" value="#B794F6">
        <div class="preset-colors">
          <div class="preset-color active" style="background:#B794F6" data-color="#B794F6"></div>
          <div class="preset-color" style="background:#F48FB1" data-color="#F48FB1"></div>
          <div class="preset-color" style="background:#64B5F6" data-color="#64B5F6"></div>
          <div class="preset-color" style="background:#66BB6A" data-color="#66BB6A"></div>
          <div class="preset-color" style="background:#FFB74D" data-color="#FFB74D"></div>
          <div class="preset-color" style="background:#4DD0E1" data-color="#4DD0E1"></div>
        </div>
      </div>

      <div class="toolbar-divider"></div>

      <div class="stats" id="stats">
        <span id="visitedCount">0</span> / <span id="totalCount">0</span> visited
      </div>

      <button class="btn btn-primary" id="shareBtn">Share / Save</button>
      <button class="btn btn-danger" id="clearBtn">Clear All</button>
    </div>
  </div>

  <div class="map-container" id="mapContainer"></div>

  <div class="zoom-controls">
    <button id="zoomIn" title="Zoom in">+</button>
    <button id="zoomOut" title="Zoom out">&minus;</button>
    <button id="zoomReset" title="Reset view">&#8634;</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="share-modal" id="shareModal">
    <div class="share-modal-content">
      <h2>Share Your Map</h2>
      <p style="font-size:0.8125rem; color:var(--md-on-surface-variant); margin-bottom:16px; line-height:1.5;">
        Copy the link below to share your visited map. Anyone with this link will see your colored regions.
      </p>
      <textarea id="shareUrl" readonly></textarea>
      <div class="btn-row">
        <button class="btn" id="closeModal">Close</button>
        <button class="btn btn-primary" id="copyLink">Copy Link</button>
      </div>
    </div>
  </div>

  <footer>
    US map &copy; <a href="https://simplemaps.com">Simplemaps.com</a> &mdash;
    World map from <a href="https://github.com/johan/world.geo.json">Natural Earth</a>
  </footer>

  <script>
    // =============================================
    // State label positions (SVG coordinate space)
    // =============================================
    const US_LABEL_POSITIONS = {"MA":{"x":938.6,"y":137.3},"MN":{"x":610.6,"y":124.9},"MT":{"x":386.3,"y":103.9},"ND":{"x":517.3,"y":104.7},"HI":{"x":375,"y":520},"ID":{"x":314.3,"y":147.8},"WA":{"x":243.3,"y":71.0},"AZ":{"x":321.2,"y":361.7},"CA":{"x":210,"y":310},"CO":{"x":432.4,"y":273.5},"NV":{"x":259.8,"y":268.7},"NM":{"x":418.2,"y":368.0},"OR":{"x":224.9,"y":136.1},"UT":{"x":338.7,"y":260.3},"WY":{"x":407.9,"y":190.1},"AR":{"x":650.1,"y":357.2},"IA":{"x":620.9,"y":211.2},"KS":{"x":548.7,"y":286.6},"MO":{"x":652.5,"y":293.9},"NE":{"x":526.9,"y":228.9},"OK":{"x":555,"y":345.4},"SD":{"x":517.7,"y":169.9},"LA":{"x":685,"y":440},"TX":{"x":520.3,"y":434.3},"CT":{"x":938,"y":158},"NH":{"x":935,"y":108},"RI":{"x":950,"y":167},"VT":{"x":912,"y":96},"AL":{"x":750.7,"y":388.6},"FL":{"x":845,"y":500},"GA":{"x":805.2,"y":376.2},"MS":{"x":696.7,"y":394.7},"SC":{"x":839.4,"y":351.1},"IL":{"x":685.8,"y":255.0},"IN":{"x":735.3,"y":247.1},"KY":{"x":760,"y":290.0},"NC":{"x":852,"y":308},"OH":{"x":784.7,"y":224.2},"TN":{"x":750.8,"y":321.3},"VA":{"x":850,"y":272},"WI":{"x":664.2,"y":151.8},"WV":{"x":832,"y":250},"DE":{"x":905,"y":247},"DC":{"x":880,"y":243},"MD":{"x":900,"y":238},"NJ":{"x":915,"y":210},"NY":{"x":893,"y":145},"PA":{"x":867,"y":194.0},"ME":{"x":952.8,"y":75},"MI":{"x":730,"y":168},"AK":{"x":161.1,"y":497.8}};

    const FILL_OPACITY = 0.78;

    // Blend a hex color with the dark surface at given opacity, return solid hex color
    function tintColor(hex, opacity) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      // Blend against the dark surface (#0E0B13) instead of white
      const sr = 14, sg = 11, sb = 19;
      const tr = Math.round(r * opacity + sr * (1 - opacity));
      const tg = Math.round(g * opacity + sg * (1 - opacity));
      const tb = Math.round(b * opacity + sb * (1 - opacity));
      return '#' + [tr, tg, tb].map(c => c.toString(16).padStart(2, '0')).join('');
    }

    const state = {
      currentMap: 'us',
      selectedColor: '#B794F6',
      visited: { us: {}, world: {} },
      svgCache: {},
      // Transform state: the SVG is positioned with translate(tx, ty) scale(zoom)
      zoom: 1,
      tx: 0,
      ty: 0,
    };

    const mapContainer = document.getElementById('mapContainer');
    const tooltip = document.getElementById('tooltip');
    const colorPicker = document.getElementById('colorPicker');
    const visitedCount = document.getElementById('visitedCount');
    const totalCount = document.getElementById('totalCount');

    // --- Color picker ---
    colorPicker.addEventListener('input', (e) => {
      state.selectedColor = e.target.value;
      document.querySelectorAll('.preset-color').forEach(el => el.classList.remove('active'));
    });

    document.querySelectorAll('.preset-color').forEach(el => {
      el.addEventListener('click', () => {
        state.selectedColor = el.dataset.color;
        colorPicker.value = el.dataset.color;
        document.querySelectorAll('.preset-color').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
      });
    });

    // --- Map tab switching ---
    document.querySelectorAll('.map-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.currentMap = btn.dataset.map;
        loadMap(btn.dataset.map);
      });
    });

    // =============================================
    // Pan + Zoom via CSS transform: translate() scale()
    // transform-origin is always 0 0; we manage offset ourselves.
    // =============================================
    const MIN_ZOOM = 1;
    const MAX_ZOOM = 10;

    function applyTransform() {
      const svg = mapContainer.querySelector('svg');
      if (!svg) return;
      svg.style.transform = `translate(${state.tx}px, ${state.ty}px) scale(${state.zoom})`;
    }

    // Clamp translation so the map can't be dragged entirely off screen.
    function clampTranslation() {
      const cw = mapContainer.clientWidth;
      const ch = mapContainer.clientHeight;
      const sw = cw * state.zoom;
      const sh = ch * state.zoom;
      // Allow dragging until only 25% of the map remains visible
      const margin = 0.25;
      const minTx = -(sw - cw * margin);
      const maxTx = cw * (1 - margin);
      const minTy = -(sh - ch * margin);
      const maxTy = ch * (1 - margin);
      state.tx = Math.max(minTx, Math.min(maxTx, state.tx));
      state.ty = Math.max(minTy, Math.min(maxTy, state.ty));
    }

    // Zoom toward a specific screen point (clientX, clientY)
    function zoomAt(newZoom, clientX, clientY) {
      const prevZoom = state.zoom;
      newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newZoom));
      if (newZoom === prevZoom) return;

      const rect = mapContainer.getBoundingClientRect();
      // Point in container coordinates
      const cx = clientX - rect.left;
      const cy = clientY - rect.top;

      // The point in "SVG space" before zoom: (cx - tx) / prevZoom
      // After zoom it should map back to the same screen point:
      // tx_new = cx - (cx - tx_old) / prevZoom * newZoom
      state.tx = cx - (cx - state.tx) / prevZoom * newZoom;
      state.ty = cy - (cy - state.ty) / prevZoom * newZoom;
      state.zoom = newZoom;

      // If zoomed back to 1x, snap to origin
      if (state.zoom <= 1) {
        state.tx = 0;
        state.ty = 0;
      } else {
        clampTranslation();
      }

      applyTransform();
    }

    // Zoom from center of container
    function zoomCenter(factor) {
      const rect = mapContainer.getBoundingClientRect();
      zoomAt(state.zoom * factor, rect.left + rect.width / 2, rect.top + rect.height / 2);
    }

    function resetView() {
      state.zoom = 1;
      state.tx = 0;
      state.ty = 0;
      applyTransform();
    }

    document.getElementById('zoomIn').addEventListener('click', () => zoomCenter(1.5));
    document.getElementById('zoomOut').addEventListener('click', () => zoomCenter(1 / 1.5));
    document.getElementById('zoomReset').addEventListener('click', resetView);

    // --- Mouse wheel zoom toward cursor ---
    let wheelTimeout = null;
    mapContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      mapContainer.classList.add('dragging');
      const factor = e.deltaY < 0 ? 1.2 : 1 / 1.2;
      zoomAt(state.zoom * factor, e.clientX, e.clientY);
      clearTimeout(wheelTimeout);
      wheelTimeout = setTimeout(() => mapContainer.classList.remove('dragging'), 120);
    }, { passive: false });

    // --- Pan (mouse drag) ---
    let dragState = null;

    mapContainer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      dragState = {
        startX: e.clientX,
        startY: e.clientY,
        startTx: state.tx,
        startTy: state.ty,
        moved: false,
      };
      mapContainer.classList.add('grabbing');
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragState) return;
      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        dragState.moved = true;
        mapContainer.classList.add('dragging');
      }
      state.tx = dragState.startTx + dx;
      state.ty = dragState.startTy + dy;
      clampTranslation();
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (dragState) {
        mapContainer.classList.remove('grabbing');
        mapContainer.classList.remove('dragging');
      }
      dragState = null;
    });

    // --- Touch: single-finger pan + two-finger pinch-zoom ---
    let touchState = null;

    mapContainer.addEventListener('touchstart', (e) => {
      mapContainer.classList.add('dragging');
      if (e.touches.length === 1) {
        const t = e.touches[0];
        touchState = {
          type: 'pan',
          startX: t.clientX,
          startY: t.clientY,
          startTx: state.tx,
          startTy: state.ty,
          moved: false,
        };
      } else if (e.touches.length === 2) {
        e.preventDefault();
        const t0 = e.touches[0], t1 = e.touches[1];
        touchState = {
          type: 'pinch',
          startDist: Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY),
          startZoom: state.zoom,
          startTx: state.tx,
          startTy: state.ty,
          midX: (t0.clientX + t1.clientX) / 2,
          midY: (t0.clientY + t1.clientY) / 2,
        };
      }
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (!touchState) return;

      if (touchState.type === 'pan' && e.touches.length === 1) {
        const t = e.touches[0];
        const dx = t.clientX - touchState.startX;
        const dy = t.clientY - touchState.startY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) touchState.moved = true;
        state.tx = touchState.startTx + dx;
        state.ty = touchState.startTy + dy;
        clampTranslation();
        applyTransform();
        e.preventDefault();
      }

      if (touchState.type === 'pinch' && e.touches.length >= 2) {
        e.preventDefault();
        const t0 = e.touches[0], t1 = e.touches[1];
        const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
        const scale = dist / touchState.startDist;
        const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, touchState.startZoom * scale));

        // Zoom toward pinch midpoint
        const rect = mapContainer.getBoundingClientRect();
        const cx = touchState.midX - rect.left;
        const cy = touchState.midY - rect.top;
        state.tx = cx - (cx - touchState.startTx) / touchState.startZoom * newZoom;
        state.ty = cy - (cy - touchState.startTy) / touchState.startZoom * newZoom;
        state.zoom = newZoom;

        if (state.zoom <= 1) { state.tx = 0; state.ty = 0; }
        else clampTranslation();
        applyTransform();
      }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
      if (e.touches.length === 0) {
        touchState = null;
        mapContainer.classList.remove('dragging');
      } else if (e.touches.length === 1 && touchState && touchState.type === 'pinch') {
        // Transition from pinch back to pan
        const t = e.touches[0];
        touchState = {
          type: 'pan',
          startX: t.clientX,
          startY: t.clientY,
          startTx: state.tx,
          startTy: state.ty,
          moved: true,
        };
      }
    });

    // --- Tooltip ---
    mapContainer.addEventListener('mousemove', (e) => {
      const path = e.target.closest('path[data-name]');
      if (path) {
        const name = path.getAttribute('data-name');
        if (name) {
          tooltip.style.display = 'block';
          tooltip.textContent = name;
          tooltip.style.left = (e.clientX + 14) + 'px';
          tooltip.style.top = (e.clientY - 12) + 'px';
          // Force reflow on first show, then add class
          if (!tooltip.classList.contains('visible')) {
            tooltip.getBoundingClientRect();
            tooltip.classList.add('visible');
          }
        }
      } else {
        tooltip.classList.remove('visible');
        // Hide after transition completes
        setTimeout(() => {
          if (!tooltip.classList.contains('visible')) tooltip.style.display = 'none';
        }, 150);
      }
    });

    mapContainer.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
      setTimeout(() => {
        if (!tooltip.classList.contains('visible')) tooltip.style.display = 'none';
      }, 150);
    });

    // --- Double-click to zoom in ---
    mapContainer.addEventListener('dblclick', (e) => {
      e.preventDefault();
      const path = e.target.closest('path[data-name]');
      if (path) return; // let single-click handle region toggling
      zoomAt(state.zoom * 2, e.clientX, e.clientY);
    });

    // --- Keyboard shortcuts ---
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '+' || e.key === '=') zoomCenter(1.5);
      else if (e.key === '-' || e.key === '_') zoomCenter(1 / 1.5);
      else if (e.key === '0') resetView();
      else if (e.key === 'Escape') {
        document.getElementById('shareModal').classList.remove('open');
      }
    });

    // --- Click to color (suppress after drag) ---
    mapContainer.addEventListener('click', (e) => {
      if (dragState && dragState.moved) return;
      if (touchState && touchState.moved) return;
      const path = e.target.closest('path[data-name]');
      if (!path) return;
      const id = path.id || path.getAttribute('data-id');
      if (!id) return;

      const mapData = state.visited[state.currentMap];

      if (mapData[id] === state.selectedColor) {
        delete mapData[id];
        path.style.fill = state.currentMap === 'us' ? '#2A2640' : '#232040';
        path.style.fillOpacity = '1';
      } else {
        mapData[id] = state.selectedColor;
        path.style.fill = tintColor(state.selectedColor, FILL_OPACITY);
        path.style.fillOpacity = '1';
      }

      // Trigger click pulse animation
      path.classList.remove('pulse');
      path.offsetWidth; // force reflow
      path.classList.add('pulse');
      path.addEventListener('animationend', () => path.classList.remove('pulse'), { once: true });

      updateStats();
      saveToLocalStorage();
    });

    // --- Stats ---
    function updateStats() {
      const paths = mapContainer.querySelectorAll('svg path[data-name]');
      const mapData = state.visited[state.currentMap];
      visitedCount.textContent = Object.keys(mapData).length;
      totalCount.textContent = paths.length;
    }

    // --- Add state labels to US map ---
    function addStateLabels(svg) {
      const ns = 'http://www.w3.org/2000/svg';
      for (const [abbr, pos] of Object.entries(US_LABEL_POSITIONS)) {
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', pos.x);
        text.setAttribute('y', pos.y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('class', 'state-label');
        text.setAttribute('font-size', '11');
        text.setAttribute('font-weight', '600');
        text.setAttribute('fill', '#E6E0E9');
        text.setAttribute('stroke', '#0E0B13');
        text.setAttribute('stroke-width', '2.5');
        text.setAttribute('paint-order', 'stroke');
        text.textContent = abbr;
        svg.appendChild(text);
      }
    }

    // --- Load SVG maps ---
    async function loadMap(mapType) {
      mapContainer.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;gap:12px;"><div style="width:24px;height:24px;border:2.5px solid var(--md-outline-variant);border-top-color:var(--md-primary);border-radius:50%;animation:spin 0.8s linear infinite;"></div><p style="color:var(--md-on-surface-variant);font-weight:500;">Loading map…</p></div>';

      try {
        let svgText;
        if (state.svgCache[mapType]) {
          svgText = state.svgCache[mapType];
        } else {
          const url = mapType === 'us' ? 'us.svg' : 'world.svg';
          const resp = await fetch(url);
          svgText = await resp.text();
          state.svgCache[mapType] = svgText;
        }

        const parser = new DOMParser();
        const doc = parser.parseFromString(svgText, 'image/svg+xml');
        const svg = doc.querySelector('svg');

        // Ensure viewBox is set
        if (!svg.getAttribute('viewBox')) {
          const w = parseFloat(svg.getAttribute('width')) || 1000;
          const h = parseFloat(svg.getAttribute('height')) || 500;
          svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        }

        // Let the SVG fill its container via CSS, remove fixed dimensions
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

        // Reset transform for new map
        state.zoom = 1;
        state.tx = 0;
        state.ty = 0;

        // Set default fills — refined dark tones with subtle warmth
        svg.querySelectorAll('path').forEach(path => {
          const defaultFill = mapType === 'us' ? '#2A2640' : '#232040';
          path.style.fill = defaultFill;
          path.style.fillOpacity = '1';
          path.style.stroke = mapType === 'us' ? '#3D3856' : '#342F52';
          path.style.strokeWidth = mapType === 'us' ? '1' : '0.5';
          path.style.strokeLinejoin = 'round';
        });

        // Add state labels for US map
        if (mapType === 'us') {
          addStateLabels(svg);
        }

        mapContainer.innerHTML = '';
        mapContainer.appendChild(svg);

        // Restore visited colors
        const mapData = state.visited[state.currentMap];
        for (const [id, color] of Object.entries(mapData)) {
          const paths = svg.querySelectorAll(`#${CSS.escape(id)}`);
          paths.forEach(p => {
            p.style.fill = tintColor(color, FILL_OPACITY);
            p.style.fillOpacity = '1';
          });
        }

        updateStats();
      } catch (err) {
        mapContainer.innerHTML = `<p style="color:var(--md-error); font-weight:500;">Failed to load map: ${err.message}</p>`;
        console.error(err);
      }
    }

    // --- Share / Save ---
    function encodeState() {
      const data = {};
      for (const [mapType, visited] of Object.entries(state.visited)) {
        if (Object.keys(visited).length > 0) {
          data[mapType] = visited;
        }
      }
      return btoa(JSON.stringify(data));
    }

    function decodeState(encoded) {
      try {
        return JSON.parse(atob(encoded));
      } catch {
        return null;
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem('visitedMaps', JSON.stringify(state.visited));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('visitedMaps');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed.us) state.visited.us = parsed.us;
          if (parsed.world) state.visited.world = parsed.world;
        } catch {}
      }
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const data = params.get('data');
      if (data) {
        const decoded = decodeState(data);
        if (decoded) {
          if (decoded.us) state.visited.us = decoded.us;
          if (decoded.world) state.visited.world = decoded.world;
          return true;
        }
      }
      return false;
    }

    document.getElementById('shareBtn').addEventListener('click', () => {
      const encoded = encodeState();
      const url = window.location.origin + window.location.pathname + '?data=' + encoded;
      document.getElementById('shareUrl').value = url;
      document.getElementById('shareModal').classList.add('open');
    });

    document.getElementById('copyLink').addEventListener('click', () => {
      const textarea = document.getElementById('shareUrl');
      textarea.select();
      navigator.clipboard.writeText(textarea.value).then(() => {
        document.getElementById('copyLink').textContent = 'Copied!';
        setTimeout(() => {
          document.getElementById('copyLink').textContent = 'Copy Link';
        }, 2000);
      });
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('shareModal').classList.remove('open');
    });

    document.getElementById('shareModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('open');
      }
    });

    // --- Clear ---
    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!confirm('Clear all visited regions on the current map?')) return;
      state.visited[state.currentMap] = {};
      saveToLocalStorage();
      loadMap(state.currentMap);
    });

    // --- Init ---
    const loadedFromUrl = loadFromUrl();
    if (!loadedFromUrl) {
      loadFromLocalStorage();
    }
    loadMap('us');
  </script>
</body>
</html>
